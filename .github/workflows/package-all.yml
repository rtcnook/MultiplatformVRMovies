name: Package All Platforms

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  android-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build Android and Web
        run: ./gradlew packageAndroid packageWeb
      - uses: actions/upload-artifact@v4
        with:
          name: android-web
          path: |
            composeApp/build/outputs/apk/**/*.apk
            composeApp/build/outputs/bundle/**/*.aab
            composeApp/build/dist/wasmJs/productionExecutable

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            command: gradlew.bat packageDesktopCurrent
            artifact-path: |
              composeApp/build/compose/binaries/main/app
              composeApp/build/compose/binaries/main/msi/*.msi
          - os: macos-latest
            name: macos
            command: ./gradlew packageDesktopCurrent packageIosFrameworks
            artifact-path: |
              composeApp/build/compose/binaries/main/app
              composeApp/build/compose/binaries/main/dmg/*.dmg
              composeApp/build/bin/iosArm64/releaseFramework
              composeApp/build/bin/iosSimulatorArm64/releaseFramework
          - os: ubuntu-latest
            name: linux
            command: ./gradlew packageDesktopCurrent
            artifact-path: |
              composeApp/build/compose/binaries/main/app
              composeApp/build/compose/binaries/main/deb/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build ${{ matrix.name }} packages
        run: ${{ matrix.command }}
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: ${{ matrix.artifact-path }}
